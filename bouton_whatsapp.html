<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejoignez-nous sur WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .whatsapp-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #25d366 0%, #20ba5c 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #25d366 0%, #20ba5c 100%);
            color: white;
            text-decoration: none;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(37, 211, 102, 0.4);
            background: linear-gradient(135deg, #20ba5c 0%, #1aa34a 100%);
        }

        .button:active {
            transform: translateY(-1px);
        }

        .features {
            margin-top: 50px;
            padding-top: 40px;
            border-top: 2px solid #f0f0f0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            justify-content: center;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-size: 20px;
        }
        .feature-text {
            text-align: left;
            color: #666;
            font-size: 14px;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                border-radius: 15px;
            }

            h1 {
                font-size: 26px;
            }

            .subtitle {
                font-size: 14px;
                margin-bottom: 30px;
            }

            .button {
                padding: 15px 40px;
                font-size: 16px;
            }

            .whatsapp-icon {
                width: 70px;
                height: 70px;
                font-size: 40px;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 25px 15px;
                border-radius: 12px;
            }

            h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 13px;
                margin-bottom: 25px;
            }

            .button {
                padding: 14px 30px;
                font-size: 14px;
                letter-spacing: 0.5px;
            }

            .whatsapp-icon {
                width: 60px;
                height: 60px;
                font-size: 35px;
                margin-bottom: 15px;
            }

            .features {
                margin-top: 30px;
                padding-top: 25px;
            }

            .feature-item {
                margin-bottom: 15px;
            }

            .feature-icon {
                width: 35px;
                height: 35px;
                margin-right: 10px;
                font-size: 18px;
            }

            .feature-text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="whatsapp-icon">💬</div>
        
        <h1>Rejoignez-nous!</h1>
        <p class="subtitle">
            Connectez-vous avec nous sur WhatsApp pour des mises à jour, du support et bien plus encore.
        </p>

        <!-- REMPLACEZ LE LIEN WHATSAPP CI-DESSOUS -->
        <a href="https://chat.whatsapp.com/It3ZuzegQZd2UgdeTpnBvH?mode=gi_t" class="button">
            Clic ici pour nous rejoindre sur WhatsApp
        </a>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">Réponse rapide et assistance 24/7</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">Accès à notre groupe exclusif</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">Dernières actualités et offres spéciales</div>
            </div>
        </div>

        <div class="footer">
            © 2024 Tous droits réservés
        </div>
    </div>
</body>
</html>
