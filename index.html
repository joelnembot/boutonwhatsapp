<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA WIN - WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 10px;
            background: #fff;
        }

        .top-bar .close-btn {
            font-size: 22px;
            color: #333;
            cursor: pointer;
            line-height: 1;
            background: none;
            border: none;
        }

        .top-bar .domain-info {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar .domain-info .lock-domain {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 15px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .top-bar .domain-info .lock-icon {
            font-size: 13px;
            color: #1a1a1a;
        }

        .top-bar .domain-info .provider {
            font-size: 12px;
            color: #555;
            margin-top: 1px;
        }

        .top-bar .menu-btn {
            font-size: 20px;
            color: #333;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* ===== WHATSAPP HEADER ===== */
        .wa-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px 10px 14px;
            border-bottom: 1px solid #eee;
        }

        .wa-header .hamburger {
            font-size: 20px;
            color: #555;
            cursor: pointer;
        }

        .wa-header .wa-logo {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .wa-header .wa-logo .wa-icon {
            width: 32px;
            height: 32px;
        }

        .wa-header .wa-logo .wa-text {
            font-size: 22px;
            font-weight: 700;
            color: #25d366;
        }

        .wa-header .download-btn {
            width: 38px;
            height: 38px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .wa-header .download-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 30px 30px;
        }

        /* Group avatar */
        .group-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 22px;
            position: relative;
            background: #222;
        }

        .group-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Fallback avatar when no image */
        .avatar-fallback {
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .avatar-fallback .ball {
            font-size: 32px;
            margin-bottom: 2px;
        }

        .avatar-fallback .fifa25-text {
            font-size: 9px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(0,0,0,0.4);
            padding: 1px 5px;
            border-radius: 3px;
            margin-bottom: 3px;
        }

        .avatar-fallback .fifa26-text {
            font-size: 18px;
            font-weight: 900;
            color: #f5c518;
            letter-spacing: 1.5px;
            text-shadow: 0 0 8px rgba(245,197,24,0.6);
        }

        .avatar-fallback .player {
            font-size: 26px;
            margin-top: 0;
        }

        /* Group name */
        .group-name {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 6px;
        }

        /* Invite subtitle */
        .invite-subtitle {
            font-size: 15px;
            color: #888;
            text-align: center;
            margin-bottom: 32px;
        }

        /* Join button */
        .join-btn {
            display: block;
            width: 100%;
            max-width: 320px;
            background: #25d366;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            padding: 16px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 28px;
            transition: background 0.2s;
        }

        .join-btn:hover {
            background: #1ebc5a;
        }

        /* No WhatsApp line */
        .no-wa {
            font-size: 14px;
            color: #555;
            text-align: center;
            margin-bottom: 6px;
        }

        .no-wa a {
            color: #00a8e6;
            text-decoration: none;
            font-size: 14px;
        }

        /* ===== BOTTOM BAR ===== */
        .bottom-bar {
            background: #1f1f1f;
            padding: 16px 20px 20px;
        }

        .bottom-bar .dl-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: #25d366;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            padding: 16px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .bottom-bar .dl-btn .dl-icon {
            font-size: 18px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 18px;
        }

        .social-circle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1.5px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: transparent;
        }

        /* X / Twitter */
        .social-circle.x svg { fill: #fff; }
        /* YouTube */
        .social-circle.yt svg { fill: #ff0000; }
        /* Instagram */
        .social-circle.ig svg { fill: url(#ig-grad); }
        /* Facebook */
        .social-circle.fb svg { fill: #1877f2; }

        /* Nav bar at the very bottom (browser nav) */
        .browser-nav {
            background: #fff;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px 20px 14px;
        }

        .browser-nav button {
            background: none;
            border: none;
            font-size: 20px;
            color: #888;
            cursor: pointer;
            padding: 4px 12px;
        }

        .browser-nav button.disabled {
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <!-- Top bar (browser chrome) -->
    <div class="top-bar">
        <button class="close-btn">✕</button>
        <div class="domain-info">
            <div class="lock-domain">
                <span class="lock-icon">🔒</span>
                <span>chat.whatsapp.com</span>
            </div>
            <div class="provider">Facebook</div>
        </div>
        <button class="menu-btn">⋯</button>
    </div>

    <!-- WhatsApp nav header -->
    <div class="wa-header">
        <button class="hamburger">☰</button>
        <div class="wa-logo">
            <!-- WhatsApp SVG logo -->
            <svg class="wa-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="24" fill="#25D366"/>

            </svg>
            <span class="wa-text">WhatsApp</span>
        </div>
        <div class="download-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/>
            </svg>
        </div>
    </div>

    <!-- Main invite content -->
    <div class="main-content">

        <!-- Group avatar -->
        <div class="group-avatar">
            <div class="avatar-fallback">
                <span class="ball">⚽</span>
                <span class="fifa25-text">FIFA 25</span>
                <span class="fifa26-text">FIFA 26</span>
                <span class="player">🤸</span>
            </div>
        </div>

        <div class="group-name">FiFA WIN 🥇2️⃣🏠📊</div>
        <div class="invite-subtitle">Invitation à un groupe WhatsApp</div>

        <!-- Join button -->
        <a href="https://whatsapp.com/channel/0029Vb6ZPNE3bbV9ZlCKLO1q" class="join-btn">
            Rejoindre la discussion
        </a>

        <p class="no-wa">Vous n'avez pas encore WhatsApp ? <a href="#">Télécharger</a></p>
    </div>

    <!-- Dark bottom section -->
    <div class="bottom-bar">
        <button class="dl-btn">
            Télécharger
            <span class="dl-icon">⬇</span>
        </button>

        <div class="social-icons">
            <!-- X / Twitter -->
            <div class="social-circle x">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </div>
            <!-- YouTube -->
            <div class="social-circle yt">
                <svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
            </div>
            <!-- Instagram -->
            <div class="social-circle ig">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#f09433"/>
                            <stop offset="25%" style="stop-color:#e6683c"/>
                            <stop offset="50%" style="stop-color:#dc2743"/>
                            <stop offset="75%" style="stop-color:#cc2366"/>
                            <stop offset="100%" style="stop-color:#bc1888"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                </svg>
            </div>
            <!-- Facebook -->
            <div class="social-circle fb">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- Browser navigation bar -->
    <div class="browser-nav">
        <button class="disabled">‹</button>
        <button class="disabled">›</button>
        <button>↗</button>
        <button>🕐</button>
    </div>

</body>
</html>
